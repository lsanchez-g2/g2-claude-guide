<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="G2 Claude Guide — A field guide to Anthropic's four products, personalized by role">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBF8F1"/>
      <stop offset="1" stop-color="#F4EFE2"/>
    </linearGradient>
    <filter id="noise" x="0" y="0" width="1" height="1">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.95
                             0 0 0 0 0.92
                             0 0 0 0 0.85
                             0 0 0 0.10 0"/>
    </filter>
  </defs>

  <!-- paper background -->
  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" filter="url(#noise)" opacity="0.5"/>

  <!-- warm ember halo -->
  <circle cx="980" cy="70" r="220" fill="#B85A3D" opacity="0.10"/>
  <circle cx="220" cy="270" r="170" fill="#6B3FA8" opacity="0.05"/>

  <!-- masthead -->
  <text x="80" y="140"
        font-family="'Oswald', 'Helvetica Neue Condensed', 'Arial Narrow', sans-serif"
        font-size="92" font-weight="700"
        fill="#18150F" letter-spacing="-1">G2 CLAUDE GUIDE</text>

  <!-- ampersand emphasis (Poppins italic) -->
  <text x="892" y="140"
        font-family="'Poppins', 'Georgia', serif"
        font-style="italic" font-size="92" font-weight="500"
        fill="#B85A3D">&amp;</text>

  <!-- subtitle -->
  <text x="82" y="186"
        font-family="'Poppins', system-ui, sans-serif"
        font-size="22" font-weight="300" fill="#4A4339">A field guide to Anthropic&#8217;s four products — personalized by role.</text>

  <!-- product legend -->
  <g transform="translate(82, 248)">
    <circle cx="6" cy="0" r="6" fill="#A36F1F"/>
    <text x="22" y="5" font-family="'Geist Mono', monospace" font-size="13" letter-spacing="2" fill="#4A4339">CHAT</text>

    <circle cx="148" cy="0" r="6" fill="#3E6A40"/>
    <text x="164" y="5" font-family="'Geist Mono', monospace" font-size="13" letter-spacing="2" fill="#4A4339">COWORK</text>

    <circle cx="306" cy="0" r="6" fill="#0F7146"/>
    <text x="322" y="5" font-family="'Geist Mono', monospace" font-size="13" letter-spacing="2" fill="#4A4339">CODE</text>

    <circle cx="438" cy="0" r="6" fill="#6B3FA8"/>
    <text x="454" y="5" font-family="'Geist Mono', monospace" font-size="13" letter-spacing="2" fill="#4A4339">DESIGN</text>
  </g>

  <!-- ember rule -->
  <rect x="82" y="280" width="64" height="3" fill="#B85A3D"/>

  <!-- by-line, top right -->
  <text x="1118" y="40" text-anchor="end"
        font-family="'Geist Mono', monospace" font-size="11" letter-spacing="2"
        fill="#7A7062">LEX SÁNCHEZ &#183; G2 &#183; 2026</text>
</svg>
